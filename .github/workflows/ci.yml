name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build and test
        run: ./mvnw verify -B

      - name: Package
        run: ./mvnw package -DskipTests -B

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/*.jar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: cheeyan/account-service:latest

      - name: Set up kubeconfig for iximiuz
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.IXIMIUZ_KUBECONFIG }}" > $HOME/.kube/config

      - name: Deploy to iximiuz
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/account-service -n account-app
